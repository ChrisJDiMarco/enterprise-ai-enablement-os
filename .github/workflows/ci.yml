name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref so only the latest commit's run survives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    # The unit suite is authored for the in-process file repository (e.g. it asserts
    # repository.mode === "file"), so DATABASE_URL is intentionally NOT set here —
    # tests run in file mode exactly as they do locally. Dedicated Postgres
    # integration tests should run in a separate job with the postgres service.
    env:
      AUTH_SECRET: ci-test-secret-not-for-production-0123456789

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DATABASE_SSL: "false"
      AUTH_SECRET: ci-test-secret-not-for-production-0123456789

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Integration tests (real Postgres)
        run: npm run test:integration
